name: CI

# Continuous integration for finance-suite. This is intentionally SEPARATE
# from deploy-pages.yml: CI validates every push/PR, deploy only runs on
# frontend changes to main. CI must stay green independent of deploys.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node is only needed so the wired `npm test` script can be exercised
      # exactly as it runs locally (it shells out to pytest).
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend test suite
        run: npm test

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      # No typecheck script is present (the frontend is plain JS + JSX), so the
      # production build doubles as the compile/integration check.
      - name: Build
        working-directory: frontend
        run: npm run build
